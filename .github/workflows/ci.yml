name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Check required backend files
        run: |
          test -f backend/src/server.js
          test -f backend/src/db/migrations.js
          test -f backend/src/db/seeder.js
          test -f backend/src/data/exams/terraform-associate-004.json
          echo "All required backend files present"

      - name: Check required frontend files
        run: |
          test -f frontend/src/App.jsx
          test -f frontend/src/context/AuthContext.jsx
          test -f frontend/src/context/ThemeContext.jsx
          test -f frontend/public/terraform-badge.svg
          echo "All required frontend files present"

      - name: Validate exam JSON
        run: |
          node -e "
            const data = require('./backend/src/data/exams/terraform-associate-004.json');
            if (!data.slug) throw new Error('Missing slug');
            if (!data.questions || data.questions.length === 0) throw new Error('No questions');
            data.questions.forEach((q, i) => {
              if (!q.external_id) throw new Error('Missing external_id at index ' + i);
              if (!q.correct_key) throw new Error('Missing correct_key at index ' + i);
              if (!q.explanation) throw new Error('Missing explanation at index ' + i);
            });
            console.log('Exam JSON valid — ' + data.questions.length + ' questions');
          "

      - name: Build backend Docker image
        run: docker build -t examforge-backend:ci ./backend

      - name: Build frontend Docker image
        run: docker build -t examforge-frontend:ci ./frontend

      - name: Confirm backend starts
        run: |
          docker run --rm -d \
            --name examforge-backend-ci \
            -e JWT_SECRET=testsecretthatisverylong1234567890abcdef \
            -e PORT=3001 \
            -e DB_PATH=/tmp/test.db \
            examforge-backend:ci
          sleep 5
          docker stop examforge-backend-ci 2>/dev/null || true
          echo "Backend image OK"
