<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#6366f1"/>

  <!-- Book spine (left side) -->
  <rect x="14" y="16" width="6" height="32" rx="2" fill="#ffffff" opacity="0.25"/>

  <!-- Book cover (main body) -->
  <rect x="18" y="14" width="28" height="34" rx="3" fill="#ffffff"/>

  <!-- Book pages (right edge) -->
  <rect x="44" y="16" width="3" height="30" rx="1.5" fill="#c7d2fe"/>

  <!-- Spine crease line -->
  <line x1="21" y1="14" x2="21" y2="48" stroke="#e0e7ff" stroke-width="1.5"/>

  <!-- Lines of text -->
  <rect x="25" y="22" width="16" height="2.5" rx="1.25" fill="#6366f1" opacity="0.35"/>
  <rect x="25" y="27" width="12" height="2.5" rx="1.25" fill="#6366f1" opacity="0.35"/>
  <rect x="25" y="32" width="14" height="2.5" rx="1.25" fill="#6366f1" opacity="0.35"/>

  <!-- Checkmark badge (bottom right) -->
  <circle cx="44" cy="46" r="9" fill="#4f46e5"/>
  <circle cx="44" cy="46" r="9" stroke="#ffffff" stroke-width="1.5"/>
  <polyline points="39.5,46 42.5,49 49,42.5" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
