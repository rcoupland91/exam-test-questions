# ExamForge — build from source
# Use this when developing locally or building your own images.
#
# Usage:
#   docker compose -f docker-compose.build.yml up --build -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: examforge-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_PATH: /data/exam.db
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    volumes:
      - db_data:/data
    networks:
      - examforge
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: examforge-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - examforge

volumes:
  db_data:
    name: examforge_db_data

networks:
  examforge:
    driver: bridge
